<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المحاضرات</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #f8fafc, #eef2f7);
}
</style>

</head>

<body class="min-h-screen">

<!-- 🔝 HERO -->
<div id="hero" class="relative h-64 md:h-80 overflow-hidden rounded-b-3xl shadow-lg">

    <img id="hero-img"
    class="absolute inset-0 w-full h-full object-cover">

    <div class="absolute inset-0 bg-black/60"></div>

    <div class="relative z-10 h-full flex flex-col justify-center items-center text-center text-white px-4">

        <h1 id="course-title"
        class="text-3xl md:text-5xl font-extrabold mb-2 tracking-tight">
        </h1>

        <p class="text-sm text-gray-200">
            ابدأ رحلتك التعليمية الآن
        </p>

    </div>
</div>

<!-- 📚 المحتوى -->
<div class="max-w-6xl mx-auto px-6 mt-10">

    <h2 class="text-xl font-bold text-gray-800 mb-6">
        المحاضرات
    </h2>

    <div id="lectures"
    class="grid gap-6 md:grid-cols-2"></div>

</div>

<script>

// 🧠 ID من الرابط
const params = new URLSearchParams(window.location.search);
const courseId = params.get("id");

// 📌 تحميل بيانات الكورس
fetch("data/courses.json")
.then(res => res.json())
.then(courses => {

    const course = courses.find(c => c.link.includes(courseId));

    if (course) {
        document.getElementById("course-title").innerText = course.title;
        document.getElementById("hero-img").src = course.img;
    }

});

// 📌 تحميل المحاضرات
fetch("data/lectures.json")
.then(res => res.json())
.then(data => {

    const lectures = data.filter(l => l.courseId === courseId);

    const container = document.getElementById("lectures");

    if (lectures.length === 0) {
        container.innerHTML = `
        <div class="col-span-full text-center text-gray-400 text-lg mt-10">
            لا توجد محاضرات حالياً
        </div>`;
        return;
    }

    lectures.forEach((l, index) => {

        container.innerHTML += `
        <div class="group bg-white rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-500 p-6 flex items-center justify-between border border-gray-100">

            <!-- LEFT -->
            <div class="flex items-center gap-4">

                <!-- رقم -->
                <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-gradient-to-br from-sky-500 to-sky-700 text-white font-extrabold text-lg shadow-md">
                    ${index + 1}
                </div>

                <!-- النص -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 group-hover:text-sky-700 transition">
                        ${l.title}
                    </h3>

                    <p class="text-xs text-gray-400 mt-1">
                        محاضرة رقم ${index + 1}
                    </p>
                </div>

            </div>

            <!-- BUTTON -->
            <a href="${l.file}" 
            class="px-5 py-2.5 bg-sky-900 text-white rounded-xl text-sm font-bold hover:bg-sky-800 transition shadow-lg shadow-sky-900/20">
                مشاهدة
            </a>

        </div>
        `;
    });

});
</script>

</body>
</html>
