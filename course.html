<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المحاضرات</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #f8fafc, #eef2f7);
}
</style>

</head>

<body class="min-h-screen">

<!-- 🔙 Back Button -->
<script>
window.addEventListener("DOMContentLoaded", function () {
    const backBtn = document.createElement("a");

    backBtn.href = "index.html"; // رجوع للكورسات
    backBtn.innerText = "← رجوع";

    backBtn.className =
        "fixed top-6 right-6 bg-[#00adef] text-white font-bold py-2 px-5 rounded-xl shadow-md hover:bg-[#0086b8] transition-all z-50";

    document.body.appendChild(backBtn);
});
</script>

<!-- 🔝 HERO (مصغر) -->
<div id="hero" class="relative h-36 md:h-44 overflow-hidden rounded-b-3xl shadow">

    <img id="hero-img"
    class="absolute inset-0 w-full h-full object-cover">

    <div class="absolute inset-0 bg-black/60"></div>

    <div class="relative z-10 h-full flex flex-col justify-center items-center text-center text-white px-4">

        <h1 id="course-title"
        class="text-2xl md:text-3xl font-extrabold">
        </h1>

    </div>
</div>

<!-- 📚 المحتوى -->
<div class="max-w-7xl mx-auto px-6 mt-8">

    <h2 class="text-lg font-bold text-gray-800 mb-4">
        المحاضرات
    </h2>

    <!-- 🔥 Grid أقوى -->
    <div id="lectures"
    class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>

</div>

<script>

// 🧠 ID
const params = new URLSearchParams(window.location.search);
const courseId = params.get("id");

// 📌 بيانات الكورس
fetch("data/courses.json")
.then(res => res.json())
.then(courses => {

    const course = courses.find(c => c.link.includes(courseId));

    if (course) {
        document.getElementById("course-title").innerText = course.title;
        document.getElementById("hero-img").src = course.img;
    }

});

// 📌 المحاضرات
fetch("data/lectures.json")
.then(res => res.json())
.then(data => {

    const lectures = data.filter(l => l.courseId === courseId);

    const container = document.getElementById("lectures");

    if (lectures.length === 0) {
        container.innerHTML = `
        <div class="col-span-full text-center text-gray-400 text-lg mt-10">
            لا توجد محاضرات
        </div>`;
        return;
    }

    lectures.forEach((l, index) => {

        container.innerHTML += `
        <div class="group bg-white rounded-xl shadow-sm hover:shadow-xl transition-all duration-300 p-4 flex flex-col justify-between border border-gray-100">

            <!-- عنوان -->
            <div class="flex items-center gap-3 mb-3">

                <div class="w-9 h-9 flex items-center justify-center rounded-lg bg-sky-100 text-sky-700 font-bold text-sm">
                    ${index + 1}
                </div>

                <h3 class="text-sm font-bold text-gray-800 group-hover:text-sky-700 transition">
                    ${l.title}
                </h3>

            </div>

            <!-- زر -->
            <a href="${l.file}" 
            class="mt-auto text-center py-2 bg-sky-900 text-white rounded-lg text-sm font-bold hover:bg-sky-800 transition">
                مشاهدة
            </a>

        </div>
        `;
    });

});
</script>

</body>
</html>
