<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MBA - دفعة فبراير 2026</title>

<!-- 🔥 اللوجو (Favicon) -->
<link rel="icon" type="image/png" href="/marketing-course/images/favicon.png">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background-color: #f3f4f6;
}
</style>
</head>


<body class="min-h-screen pb-20">

<!-- Header -->
<header class="bg-sky-900 text-white py-12 px-6 shadow-xl mb-8">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-4">

    <!-- اللوجو -->
    <img src="/marketing-course/images/favicon.png" 
         alt="MBA Logo"
         class="w-12 h-12 rounded-lg shadow-md bg-white p-1">

    <!-- النص -->
    <div>
        <h1 class="text-4xl font-extrabold tracking-wide">MBA</h1>
        <p class="text-sky-200 text-sm md:text-base">
            الماجستير المهني في إدارة الأعمال – دفعة فبراير 2026
        </p>
    </div>

</div>

        <div class="bg-sky-800/50 p-4 rounded-xl border border-sky-700 text-center">
            <span class="block text-2xl font-bold italic">Semester 1</span>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6">

<!-- Stats -->
<section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">

<div class="bg-white p-5 rounded-2xl shadow border-b-4 border-sky-600">
<p class="text-gray-500 text-sm">المواد المسجلة</p>
<h3 class="text-2xl font-bold text-sky-900">3 مواد</h3>
</div>

<div class="bg-white p-5 rounded-2xl shadow border-b-4 border-emerald-500">
<p class="text-gray-500 text-sm">عدد المحاضرات</p>
<h3 id="total-lectures" class="text-2xl font-bold text-emerald-600">0</h3>
</div>

<div class="bg-white p-5 rounded-2xl shadow border-b-4 border-amber-500">
<p class="text-gray-500 text-sm">الساعات المعتمدة</p>
<h3 class="text-2xl font-bold text-amber-600">48 ساعة</h3>
</div>
<div class="bg-white p-5 rounded-2xl shadow border-b-4 border-amber-500">    
<p class="text-gray-500 text-sm mb-1">آخر محاضرة</p>
<h3 id="last-lecture" class="text-sm font-bold text-rose-600">
-- لا يوجد --
</h3>

</div>

</section>

<!-- Courses -->
<h2 class="text-2xl font-bold mb-6">المقررات الدراسية الحالية</h2>

<div id="courses-container" class="grid md:grid-cols-2 gap-8"></div>

</main>

<script>

Promise.all([
fetch("data/courses.json").then(res => res.json()),
fetch("data/lectures.json").then(res => res.json())
])
.then(([courses, lectures]) => {

const container = document.getElementById("courses-container");
const totalLecturesEl = document.getElementById("total-lectures");

container.innerHTML = "";

let totalLectures = 0;

courses.forEach(course => {

const courseId = course.link.split("id=")[1];

// عدد المحاضرات
const courseLectures = lectures.filter(l => l.courseId === courseId);
const count = courseLectures.length;

totalLectures += count;

container.innerHTML += `
<div class="bg-white rounded-3xl shadow hover:shadow-xl transition flex flex-col md:flex-row overflow-hidden">

<div class="md:w-2/5 h-48 md:h-auto">
<img src="${course.img}" class="w-full h-full object-cover">
</div>

<div class="p-6 flex flex-col justify-between md:w-3/5">

<div>
<h3 class="text-xl font-bold mb-2">${course.title}</h3>
<p class="text-sm text-sky-700 mb-2">${course.instructor}</p>
<p class="text-sm text-gray-500">${course.desc}</p>
</div>

<div class="flex justify-between items-center mt-4">

<span class="text-sm font-bold text-gray-500">
${count} محاضرة
</span>

<a href="${course.link}" 
class="bg-sky-900 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-sky-800 transition">
دخول المحاضرات
</a>

</div>

</div>

</div>
`;
});

// إجمالي المحاضرات
totalLecturesEl.innerText = totalLectures;

})
.catch(err => {
console.error(err);
});

</script>

</body>
</html>
