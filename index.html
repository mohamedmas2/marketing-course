<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المنصة التعليمية</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background-color: #F9FAFB;
}
.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}
</style>

</head>

<body class="p-10">

<h1 class="text-3xl font-bold text-center text-sky-800 mb-10">
🎓 المنصة التعليمية
</h1>

<div class="max-w-6xl mx-auto">
    <div id="courses" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<script>
// 👇 كل المواد هنا بس
const data = [
    {
        title: "📊 إدارة التسويق",
        desc: "محاضرات التسويق كاملة",
        link: "marketing/index.html",
        color: "border-sky-100"
    },
    {
        title: "👥 الموارد البشرية",
        desc: "محاضرات HR",
        link: "hr/index.html",
        color: "border-green-100"
    },
    // تقدر تزود براحتك هنا 👇
    {
        title: "💰 المحاسبة",
        desc: "محاضرات المحاسبة",
        link: "accounting/index.html",
        color: "border-yellow-100"
    }
];

// render
const container = document.getElementById("courses");

data.forEach(item => {
    container.innerHTML += `
        <a href="${item.link}"
           class="card bg-white p-6 rounded-xl shadow border ${item.color} text-center h-full flex flex-col justify-center">
            <h2 class="text-xl font-bold mb-2">${item.title}</h2>
            <p class="text-gray-600">${item.desc}</p>
        </a>
    `;
});
</script>

</body>
</html>
