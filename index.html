<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة إدارة التسويق</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background-color: #F9FAFB;
}
.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}
</style>

</head>

<body class="p-10">

<h1 class="text-3xl font-bold text-sky-800 text-center mb-10">
📚 منصة إدارة التسويق
</h1>

<div id="lecturesContainer" class="grid md:grid-cols-3 gap-6"></div>

<script>
const lectures = [
  {
    title: "المحاضرة الأولى",
    desc: "المفهوم التسويقي وأهميته",
    file: "lectures/lecture1.html"
  },
  {
    title: "المحاضرة الثانية",
    desc: "تجربة النظام",
    file: "lectures/lecture2.html"
  }
    {
  title: "المحاضرة الثالثة",
  desc: "عنوان جديد",
  file: "lectures/lecture3.html"
}
];

const container = document.getElementById('lecturesContainer');

lectures.forEach(lec => {
  container.innerHTML += `
    <a href="${lec.file}" class="card bg-white p-6 rounded-xl shadow border border-sky-100">
        <h2 class="text-xl font-bold text-gray-800 mb-2">${lec.title}</h2>
        <p class="text-gray-600">${lec.desc}</p>
    </a>
  `;
});
</script>

</body>
</html>
