<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المنصة التعليمية</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background-color: #F9FAFB;
}
</style>

</head>

<body class="p-10">

<h1 class="text-3xl font-bold text-center text-sky-800 mb-10">
🎓 المنصة التعليمية
</h1>

<div class="max-w-6xl mx-auto">
    <div id="courses" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<script>

// 👇 المواد + صور حقيقية (مش icons)
const data = [
    {
        title: "إدارة التسويق",
        desc: "محاضرات التسويق",
        link: "marketing/index.html",
        img: "https://images.unsplash.com/photo-1556740738-b6a63e27c4df",
    },
    {
        title: "الموارد البشرية",
        desc: "محاضرات HR",
        link: "hr/index.html",
        img: "https://images.unsplash.com/photo-1521737604893-d14cc237f11d",
    },
    {
        title: "محاسبة إدارية",
        desc: "محاضرات محاسبة ادارية",
        link: "accounting/index.html",
        img: "https://images.unsplash.com/photo-1554224155-6726b3ff858f",
    },
    {
        title: "ثقافة إسلامية",
        desc: "محاضرات الثقافة الإسلامية",
        link: "accounting/index.html",
        img: "https://images.unsplash.com/photo-1504052434569-70ad5836ab65",
    }
];

// render
const container = document.getElementById("courses");

data.forEach(item => {
    container.innerHTML += `
    <a href="${item.link}"
    class="group relative overflow-hidden rounded-2xl h-56 shadow-lg">

        <!-- الصورة -->
        <img src="${item.img}" 
             class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition duration-500">

        <!-- طبقة غامقة -->
        <div class="absolute inset-0 bg-black/40 group-hover:bg-sky-900/80 transition duration-300"></div>

        <!-- المحتوى -->
        <div class="relative z-10 h-full flex flex-col justify-end p-5 text-white">

            <h2 class="text-xl font-bold mb-1 group-hover:-translate-y-1 transition">
                ${item.title}
            </h2>

            <p class="text-sm opacity-90">
                ${item.desc}
            </p>

        </div>

    </a>
    `;
});

</script>

</body>
</html>
