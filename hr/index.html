<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الموارد البشرية</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background-color: #F9FAFB;
}
.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}
</style>

</head>

<body class="p-10">

<h1 class="text-3xl font-bold text-sky-800 text-center mb-10">
👥 الموارد البشرية
</h1>

<div id="lecturesContainer" class="grid md:grid-cols-3 gap-6"></div>

<script>
fetch('./data/lectures.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('lecturesContainer');

    data.lectures.forEach(lec => {
      container.innerHTML += `
        <a href="${lec.file}" class="card bg-white p-6 rounded-xl shadow border border-sky-100">
            <h2 class="text-xl font-bold text-gray-800 mb-2">${lec.title}</h2>
            <p class="text-gray-600">${lec.desc}</p>
        </a>
      `;
    });
  })
  .catch(err => {
    document.body.innerHTML = "<h2 style='color:red'>في مشكلة في تحميل البيانات</h2>";
    console.error(err);
  });
</script>
<script src="../js/global.js"></script>
</body>
</html>
