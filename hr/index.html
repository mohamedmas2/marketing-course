<script>
fetch('data/lectures.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('lecturesContainer');

    data.lectures.forEach(lec => {
      container.innerHTML += `
        <a href="${lec.file}" class="card bg-white p-6 rounded-xl shadow border border-sky-100">
            <h2 class="text-xl font-bold text-gray-800 mb-2">${lec.title}</h2>
            <p class="text-gray-600">${lec.desc}</p>
        </a>
      `;
    });
  })
  .catch(err => {
    document.body.innerHTML = "<h2 style='color:red'>في مشكلة في تحميل البيانات</h2>";
    console.error(err);
  });
</script>
